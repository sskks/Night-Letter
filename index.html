<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="canvas:aspect-ratio" content="9:16">
<title>еӨңдҝЎ Night Letter</title>
<style>
@import url('https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@200;
/* ЧЦМејУФШУЕ»ҜЈәПИПФКҫПөНіЧЦМеЈ¬webЧЦМејУФШәуМж»» */
:root{font-display:swap;}300;400;500;600&family=Noto+Sans+SC:wght@100;200;300;400;500&display=swap');

:root{
  --bg:#0d0d1f;--bg2:#151530;
  --t1:rgba(255,255,255,.96);--t2:rgba(255,255,255,.72);--t3:rgba(255,255,255,.45);--t4:rgba(255,255,255,.22);
  --accent:#d4b896;--adim:rgba(212,184,150,.15);--aglow:rgba(212,184,150,.3);
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --ec:#7dd4e0;--ef:#d48090;--ej:#d4c080;--el:#a882d4;--ek:#80a0d4;
  --serif:'Noto Serif SC','Songti SC','STSong','SimSun','PingFang SC','Microsoft YaHei',Georgia,serif;
  --sans:'Noto Sans SC','PingFang SC','Microsoft YaHei','Helvetica Neue',-apple-system,system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--t1);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;border:none;outline:none;background:none}

#app{position:relative;width:100%;height:100%;max-width:430px;margin:0 auto;overflow:hidden;background:var(--bg)}

.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateX(50px);transition:opacity .5s var(--ease),transform .5s var(--ease),visibility 0s .5s;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1}
.scr.on{opacity:1;visibility:visible;transform:translateX(0);will-change:transform;transition:opacity .5s var(--ease),transform .5s var(--ease),visibility 0s 0s;z-index:3}
.scr.leave{transform:translateX(-50px);opacity:0}
.scr::-webkit-scrollbar{display:none}

#app{padding-top:0}

/* HOME */
.home-canvas{position:absolute;inset:0;z-index:0}
#homeCanvas{width:100%;height:100%;display:block}
.home-overlay{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column}
.home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;position:relative}
.home-period{font-size:11px;font-weight:200;letter-spacing:5px;color:rgba(255,255,255,.22);text-transform:uppercase;margin-bottom:24px;opacity:0;animation:hfade 1.2s ease-out .3s forwards}
.home-title{font-family:var(--serif);font-size:34px;font-weight:300;line-height:1.5;text-align:center;color:rgba(255,255,255,.92);letter-spacing:3px;margin-bottom:12px;opacity:0;animation:hfade 1.2s ease-out .6s forwards}
.home-desc{font-size:14px;font-weight:200;color:rgba(255,255,255,.4);text-align:center;line-height:2;letter-spacing:1px;margin-bottom:40px;opacity:0;animation:hfade 1.2s ease-out .9s forwards}
@keyframes hfade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.ink-cta{position:relative;width:88px;height:88px;margin-bottom:8px;opacity:0;animation:hfade 1s ease-out 1.3s forwards}
.ink-cta-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(202,169,122,.12);transform:translateZ(0);will-change:transform,opacity;animation:ink-ring 6s ease-in-out infinite}
@keyframes ink-ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.6);opacity:0}}
.ink-cta-core{
  position:absolute;inset:12px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(202,169,122,.12),rgba(202,169,122,.04) 60%,transparent 80%);
  border:1px solid rgba(202,169,122,.18);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .3s var(--spring);
  box-shadow:0 0 20px rgba(202,169,122,.05);
}
.ink-cta-core svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.ink-cta-core:active{transform:scale(.88);box-shadow:0 0 20px rgba(202,169,122,.08)}
.ink-cta-label{font-family:var(--serif);font-size:12px;color:rgba(255,255,255,.2);letter-spacing:4px;opacity:0;animation:hfade 1s ease-out 1.6s forwards}

/* Home recent dreams */
.home-recent{width:100%;padding:0 28px;margin-bottom:16px;opacity:0;animation:hfade 1s ease-out 1.9s forwards}
.home-recent-title{font-size:10px;color:var(--t3);letter-spacing:2px;margin-bottom:10px}
.home-recent-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.home-recent-list::-webkit-scrollbar{display:none}
.home-recent-item{flex-shrink:0;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:.5px solid var(--line);min-width:140px;max-width:180px;transition:all .2s var(--ease)}
.home-recent-item:active{background:rgba(255,255,255,.06);border-color:rgba(202,169,122,.15)}
.hri-text{font-size:11px;font-weight:300;color:var(--t2);line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.hri-meta{font-size:9px;color:var(--t3);display:flex;align-items:center;gap:4px}
.hri-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.home-empty{font-size:11px;color:var(--t4);text-align:center;padding:12px 0;letter-spacing:.5px}

/* Micro check-in bar */
.checkin-bar{width:100%;padding:0 28px;margin-bottom:12px;opacity:0;animation:hfade 1s ease-out 2.2s forwards}
.checkin-title{font-size:10px;color:var(--t3);letter-spacing:1.5px;margin-bottom:8px;text-align:center}
.checkin-moods{display:flex;justify-content:center;gap:12px}
.mood-btn{width:42px;height:42px;border-radius:50%;border:.5px solid var(--line2);background:rgba(255,255,255,.02);font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .25s var(--spring);cursor:pointer;padding:0}
.mood-btn:active{transform:scale(.85);background:rgba(202,169,122,.1);border-color:rgba(202,169,122,.3)}
.mood-btn.checked{border-color:rgba(202,169,122,.5);background:rgba(202,169,122,.12);transform:scale(1.08);box-shadow:0 0 12px rgba(202,169,122,.15)}
.checkin-done{font-size:10px;color:var(--t3);letter-spacing:1px;text-align:center;padding:6px 0;opacity:.6}

.home-foot{display:flex;align-items:center;justify-content:space-between;padding:0 28px 20px;flex-shrink:0;opacity:0;animation:hfade 1s ease-out 2s forwards;position:relative;z-index:2}
.hf-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.hf-stat b{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--accent)}
.hf-stat small{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px}
.hf-globe{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:18px;border:.5px solid var(--line2);background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-size:11px;color:var(--t3);letter-spacing:.5px;transition:all .2s var(--ease)}
.hf-globe:active{background:rgba(255,255,255,.06)}
.hf-globe svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.bnav{display:flex;align-items:center;justify-content:space-around;height:82px;padding-bottom:26px;flex-shrink:0;position:relative;z-index:10;background:rgba(5,5,16,.75);backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);border-top:.5px solid rgba(202,169,122,.06)}
.btab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 18px;border-radius:12px;transition:all .2s var(--ease)}
.btab svg{width:26px;height:26px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.btab span{font-size:11px;color:var(--t3);letter-spacing:.5px;transition:color .2s}
.btab.on svg{stroke:var(--accent)}.btab.on span{color:var(--accent)}
.btab:active{background:rgba(255,255,255,.03);transform:scale(.9)}
.bfab{width:52px;height:52px;border-radius:50%;border:1px solid rgba(202,169,122,.5);display:flex;align-items:center;justify-content:center;margin-top:-16px;position:relative;transition:transform .25s var(--spring);box-shadow:0 0 12px rgba(202,169,122,.06)}
.bfab::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:radial-gradient(circle,rgba(202,169,122,.08),transparent 70%);opacity:.15}
.bfab svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.bfab:active{transform:scale(.85)}

/* NAV HEADER */
.nhdr{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 8px;flex-shrink:0;z-index:10}
.nhdr-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;transition:background .15s}
.nhdr-back:active{background:rgba(255,255,255,.08)}
.nhdr-back svg{width:20px;height:20px;stroke:var(--t2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nhdr-c{font-size:12px;color:var(--t3);letter-spacing:1px}
.nhdr-act{width:44px;height:44px;border-radius:50%;border:.5px solid var(--line2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.nhdr-act:active{background:rgba(255,255,255,.04);border-color:var(--accent)}
.nhdr-act svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* SUB-PAGE AMBIENT CANVAS */
.sub-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
.sub-canvas canvas{width:100%;height:100%;display:block}

/* WRITE */
.write-zone{flex:1;padding:4px 26px 0;display:flex;flex-direction:column;position:relative;z-index:1}
.write-sal{font-family:var(--serif);font-size:14px;color:var(--t3);margin-bottom:18px;letter-spacing:1.5px;text-shadow:0 0 20px rgba(202,169,122,.08)}
.write-field{flex:1;min-height:160px;font-family:var(--serif);font-size:17px;font-weight:300;line-height:2.1;color:var(--t1);letter-spacing:.4px;resize:none;caret-color:var(--accent);background:transparent}
.write-field::placeholder{color:var(--t4);font-style:italic}
.write-zone::before{content:'';position:absolute;top:50px;left:26px;right:26px;bottom:0;background:repeating-linear-gradient(transparent,transparent 35px,rgba(202,169,122,.025) 35px,rgba(202,169,122,.025) 36px);pointer-events:none;z-index:0}
.write-zone::before.insomnia-mode{background:repeating-linear-gradient(transparent,transparent 35px,rgba(120,100,200,.03) 35px,rgba(120,100,200,.03) 36px)}
#modeToggle.on{border-color:rgba(120,100,200,.4);color:#a882d4;background:rgba(120,100,200,.1)}
.write-bot{padding:14px 26px 34px;flex-shrink:0;z-index:1}

/* Emotion chips */
.write-emotions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.we-chip{padding:8px 14px;border-radius:16px;font-size:12px;letter-spacing:.5px;border:.5px solid var(--line2);color:var(--t3);transition:all .2s var(--ease);display:flex;align-items:center;gap:5px}
.we-chip:active{transform:scale(.95)}
.we-chip.on{border-color:var(--accent);color:var(--accent);background:var(--adim);box-shadow:0 0 12px rgba(202,169,122,.06)}
.we-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.write-actions{display:flex;gap:10px;align-items:center}
.write-mic{width:52px;height:52px;border-radius:50%;border:.5px solid var(--line2);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s var(--ease)}
.write-mic:active{background:rgba(255,255,255,.06);border-color:var(--accent);transform:scale(.92)}
.write-mic svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.btn-send{flex:1;padding:18px;border-radius:20px;border:.8px solid var(--accent);background:linear-gradient(135deg,rgba(202,169,122,.04),rgba(202,169,122,.01));font-family:var(--serif);font-size:15px;color:var(--accent);letter-spacing:4px;position:relative;overflow:hidden;transition:all .3s var(--ease);box-shadow:0 0 20px rgba(202,169,122,.04)}
.btn-send:active{background:linear-gradient(135deg,rgba(202,169,122,.1),rgba(202,169,122,.03));transform:scale(.97);box-shadow:0 0 30px rgba(202,169,122,.08)}

/* RECEIVING */
.recv-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;z-index:1;position:relative}
.recv-rings{width:120px;height:120px;position:relative;margin-bottom:48px}
.recv-r{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(202,169,122,.4);opacity:0;animation:ringx 4s ease-out infinite}
.recv-r:nth-child(2){animation-delay:1s;border-color:rgba(202,169,122,.3)}
.recv-r:nth-child(3){animation-delay:2s;border-color:rgba(202,169,122,.2)}
.recv-r:nth-child(4){animation-delay:3s;border-color:rgba(202,169,122,.1)}
@keyframes ringx{0%{transform:scale(.2);opacity:.5}100%{transform:scale(1.6);opacity:0}}
.recv-dot{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:12px;height:12px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 20px rgba(202,169,122,.5),0 0 60px rgba(202,169,122,.2),0 0 100px rgba(202,169,122,.08);
  animation:dotPulse 2s ease-in-out infinite
}
@keyframes dotPulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 20px rgba(202,169,122,.5),0 0 60px rgba(202,169,122,.2)}50%{transform:translate(-50%,-50%) scale(1.3);box-shadow:0 0 30px rgba(202,169,122,.6),0 0 80px rgba(202,169,122,.3)}}
.recv-card{
  position:relative;max-width:320px;width:100%;padding:32px 28px;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.015));
  border:.5px solid rgba(202,169,122,.1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(202,169,122,.04),0 8px 32px rgba(0,0,0,.2);
  opacity:0;animation:recvCardIn .8s ease-out .3s forwards;
  overflow:hidden
}
.recv-card::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 50% 50%,rgba(202,169,122,.06),transparent 60%);
  animation:recvGlow 4s ease-in-out infinite;pointer-events:none
}
@keyframes recvGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes recvCardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.recv-txt{
  font-family:var(--serif);font-size:15px;font-weight:300;color:var(--t2);
  text-align:center;line-height:2.4;letter-spacing:1px;position:relative;z-index:1
}
.recv-txt span{display:inline-block;opacity:0;animation:recvWordIn .5s ease-out forwards}
.recv-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(202,169,122,.3),transparent);margin:16px auto 0;position:relative;z-index:1;opacity:0;animation:hfade .6s ease-out 2s forwards}
.recv-hint{font-size:11px;color:var(--t3);text-align:center;letter-spacing:.5px;margin-top:12px;position:relative;z-index:1;opacity:0;animation:hfade .6s ease-out 2.2s forwards}
@keyframes recvWordIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* AI CHAT */
.chat-body{flex:1;display:flex;flex-direction:column;z-index:1;overflow:hidden;position:relative}
.chat-scroll{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:12px}
.chat-scroll::-webkit-scrollbar{display:none}
.chat-bubble{max-width:82%;padding:14px 18px;border-radius:18px;font-size:14px;font-weight:300;line-height:1.9;letter-spacing:.3px;animation:letterIn .4s ease-out forwards;opacity:0;min-height:44px;word-break:break-word}
.chat-ai{align-self:flex-start;background:linear-gradient(135deg,rgba(202,169,122,.08),rgba(202,169,122,.03));border:.5px solid rgba(202,169,122,.12);color:var(--t1);border-bottom-left-radius:6px;font-family:var(--serif)}
.chat-user{align-self:flex-end;background:rgba(255,255,255,.06);border:.5px solid var(--line2);color:var(--t1);border-bottom-right-radius:6px}
.chat-ai .hl{color:var(--accent);font-weight:400}
.typing-indicator{align-self:flex-start;padding:14px 20px;border-radius:18px;border-bottom-left-radius:6px;background:linear-gradient(135deg,rgba(202,169,122,.06),rgba(202,169,122,.02));border:.5px solid rgba(202,169,122,.08);display:flex;gap:5px;align-items:center}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:typeDot 1.4s ease-in-out infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.8;transform:translateY(-4px)}}
.chat-input-bar{padding:10px 16px 34px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;z-index:2;background:rgba(5,5,16,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--line)}
.chat-input{flex:1;padding:12px 16px;border-radius:20px;background:rgba(255,255,255,.05);border:.5px solid var(--line2);font-size:14px;font-weight:300;color:var(--t1);caret-color:var(--accent);transition:border-color .2s}
.chat-input:focus{border-color:rgba(202,169,122,.3)}
.chat-input::placeholder{color:var(--t4)}
.chat-send-btn{width:48px;height:48px;border-radius:50%;border:.5px solid var(--accent);background:linear-gradient(135deg,rgba(202,169,122,.08),rgba(202,169,122,.02));display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s var(--ease)}
.chat-send-btn:active{background:rgba(202,169,122,.15);transform:scale(.9)}
.chat-send-btn svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.chat-done{text-align:center;padding:8px 20px 4px;font-size:11px;color:var(--t3);letter-spacing:1px}
.chat-done-btn{display:inline-block;margin-top:10px;padding:12px 28px;border-radius:18px;border:.5px solid var(--accent);font-family:var(--serif);font-size:14px;color:var(--accent);letter-spacing:2px;background:linear-gradient(135deg,rgba(202,169,122,.06),transparent);transition:all .2s var(--ease)}
.chat-done-btn:active{background:rgba(202,169,122,.1);transform:scale(.97)}
.regen-btn{display:block;margin-top:10px;padding:6px 14px;border-radius:12px;border:.5px solid rgba(202,169,122,.2);font-size:11px;color:var(--t3);letter-spacing:.5px;background:rgba(255,255,255,.03);transition:all .2s var(--ease)}
.regen-btn:hover{border-color:rgba(202,169,122,.4);color:var(--accent);background:rgba(202,169,122,.06)}
.regen-btn:active{transform:scale(.95)}

/* Persona selector bar */
.persona-bar{display:flex;justify-content:center;gap:8px;padding:4px 16px 8px;flex-shrink:0;z-index:2}
.persona-chip{padding:5px 14px;border-radius:14px;border:.5px solid var(--line2);font-size:11px;color:var(--t3);letter-spacing:.5px;background:rgba(255,255,255,.02);transition:all .2s var(--ease);cursor:pointer;white-space:nowrap}
.persona-chip.active{border-color:rgba(202,169,122,.4);color:var(--accent);background:rgba(202,169,122,.08)}
.persona-chip:active{transform:scale(.95)}

/* VOICE OVERLAY */
.voice-overlay{position:fixed;inset:0;z-index:500;background:rgba(5,5,16,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;visibility:hidden;transform:scale(.96);transition:opacity .4s var(--ease),visibility 0s .4s,transform .4s var(--ease);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.voice-overlay.on{opacity:1;visibility:visible;transform:scale(1);transition:opacity .4s var(--ease),visibility 0s 0s,transform .4s var(--ease)}
.voice-ring{width:160px;height:160px;border-radius:50%;border:1.5px solid rgba(202,169,122,.3);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:32px}
.voice-ring::before{content:'';position:absolute;inset:-15px;border-radius:50%;border:1px solid rgba(202,169,122,.1);animation:voicePulse 2s ease-in-out infinite}
.voice-ring::after{content:'';position:absolute;inset:-30px;border-radius:50%;border:1px solid rgba(202,169,122,.05);animation:voicePulse 2s ease-in-out infinite .5s}
@keyframes voicePulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.voice-core{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(202,169,122,.2),rgba(202,169,122,.06) 70%);border:1px solid rgba(202,169,122,.3);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 0 40px rgba(202,169,122,.08)}
.voice-core svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.voice-status{font-family:var(--serif);font-size:16px;font-weight:300;color:var(--t2);letter-spacing:2px;margin-bottom:8px}
.voice-time{font-size:12px;color:var(--t3);letter-spacing:1px;margin-bottom:8px}
.voice-preview{font-size:13px;font-weight:300;color:var(--t2);text-align:center;max-width:280px;line-height:1.8;min-height:40px;margin-bottom:28px}
.voice-stop{width:64px;height:64px;border-radius:50%;border:1px solid rgba(202,169,122,.3);background:rgba(202,169,122,.06);display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.voice-stop:active{background:rgba(202,169,122,.12);transform:scale(.9)}
.voice-stop svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.voice-fallback{font-size:12px;color:var(--t3);text-align:center;max-width:240px;line-height:1.8;margin-top:16px;padding:12px 16px;border-radius:12px;border:.5px solid var(--line);background:rgba(255,255,255,.02)}

/* ONBOARDING */
.onboard{position:fixed;inset:0;z-index:600;background:var(--bg);display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:all .5s var(--ease)}
.onboard.on{opacity:1;visibility:visible}
.ob-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center}
.ob-icon{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(202,169,122,.15),rgba(202,169,122,.04) 70%);border:1px solid rgba(202,169,122,.2);display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 0 40px rgba(202,169,122,.06)}
.ob-icon svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
.ob-title{font-family:var(--serif);font-size:24px;font-weight:300;color:var(--t1);letter-spacing:2px;margin-bottom:14px;line-height:1.6}
.ob-desc{font-size:14px;font-weight:300;color:var(--t2);line-height:2;letter-spacing:.5px;margin-bottom:40px}
.ob-dots{display:flex;gap:8px;margin-bottom:32px}
.ob-dot{width:6px;height:6px;border-radius:50%;background:var(--t4);transition:all .3s var(--ease)}
.ob-dot.on{background:var(--accent);width:18px;border-radius:3px}
.ob-btn{padding:16px 48px;border-radius:22px;border:.8px solid var(--accent);font-family:var(--serif);font-size:15px;color:var(--accent);letter-spacing:3px;background:linear-gradient(135deg,rgba(202,169,122,.04),transparent);transition:all .3s var(--ease)}
.ob-btn:active{background:rgba(202,169,122,.1);transform:scale(.97)}
.ob-skip{margin-top:16px;font-size:12px;color:var(--t3);letter-spacing:1px;padding:8px 16px}

/* HISTORY */
.hist-body{flex:1;padding:4px 22px 18px;overflow-y:auto;z-index:1}
.hist-body::-webkit-scrollbar{display:none}
.hist-filter-bar{padding:6px 22px 2px;z-index:1}
.hist-search-wrap{position:relative;margin-bottom:8px}
.hist-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.hist-search-input{width:100%;box-sizing:border-box;padding:9px 14px 9px 34px;border-radius:14px;border:.5px solid rgba(202,169,122,.12);background:rgba(255,255,255,.04);color:var(--t1);font-size:13px;font-weight:300;letter-spacing:.3px;outline:none;transition:border-color .2s,background .2s}
.hist-search-input::placeholder{color:var(--t3);font-weight:300}
.hist-search-input:focus{border-color:rgba(202,169,122,.25);background:rgba(255,255,255,.06)}
.hist-emotion-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;-ms-overflow-style:none;scrollbar-width:none}
.hist-emotion-chips::-webkit-scrollbar{display:none}
.hist-chip{flex-shrink:0;padding:5px 13px;border-radius:20px;border:.5px solid rgba(202,169,122,.1);background:rgba(255,255,255,.03);color:var(--t3);font-size:11px;font-weight:400;letter-spacing:.4px;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap}
.hist-chip:active{transform:scale(.95)}
.hist-chip.active{background:rgba(202,169,122,.12);color:var(--accent);border-color:rgba(202,169,122,.25)}
.hist-hl{background:rgba(202,169,122,.25);color:var(--t1);border-radius:2px;padding:0 1px}
.hist-item{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.08);margin-bottom:10px;transition:all .2s var(--ease);position:relative;overflow:hidden}
.hist-item:active{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border-color:rgba(202,169,122,.15)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;box-shadow:0 0 10px currentColor}
.hist-info{flex:1;min-width:0}
.hist-text{font-size:13px;font-weight:300;color:var(--t1);line-height:1.8;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hist-meta{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.hist-tag{font-size:9px;padding:3px 10px;border-radius:10px;background:rgba(202,169,122,.06);color:var(--accent);border:.5px solid rgba(202,169,122,.1);letter-spacing:.5px}
.hist-empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;font-weight:300;line-height:2}

/* SETTINGS */
.set-body{flex:1;padding:8px 22px 18px;overflow-y:auto;z-index:1}
.set-body::-webkit-scrollbar{display:none}
.set-section{margin-bottom:28px}
.set-section-title{font-family:var(--serif);font-size:13px;font-weight:300;color:var(--accent);letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.set-section-title::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,var(--line),transparent)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.03);border:.5px solid var(--line);margin-bottom:8px}
.set-label{font-size:13px;font-weight:300;color:var(--t1);letter-spacing:.3px}
.set-sub{font-size:10px;color:var(--t3);margin-top:2px;letter-spacing:.2px}
.set-toggle{width:48px;height:28px;border-radius:14px;background:rgba(255,255,255,.1);position:relative;transition:background .2s var(--ease);flex-shrink:0}
.set-toggle.on{background:rgba(202,169,122,.35)}
.set-toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--t1);transition:transform .2s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.set-toggle.on::after{transform:translateX(20px)}
.set-val{font-size:12px;color:var(--t3);letter-spacing:.3px}
.set-about{text-align:center;padding:20px;font-size:11px;color:var(--t3);line-height:2;letter-spacing:.3px}

/* NIGHTSCAPE */
.ns-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 8px;flex-shrink:0;z-index:10}
.ns-tg{display:flex;flex-direction:column;gap:2px}
.ns-t{font-family:var(--serif);font-size:17px;font-weight:300;letter-spacing:2px}
.ns-sub{font-size:10px;color:var(--t3);letter-spacing:1px}
.ns-vp{flex:1;position:relative;margin:4px 14px 10px;border-radius:20px;overflow:hidden;background:radial-gradient(ellipse at 50% 20%,#0d1028,#080818 60%,var(--bg));border:.5px solid rgba(202,169,122,.08);box-shadow:inset 0 0 60px rgba(0,0,0,.5)}
#starC{position:absolute;inset:0;width:100%;height:100%}
.ns-info{padding:4px 18px 10px;flex-shrink:0;z-index:1}
.ns-icard{padding:16px 20px;border-radius:14px;background:linear-gradient(135deg,rgba(202,169,122,.03),rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.08);box-shadow:0 0 16px rgba(202,169,122,.02)}
.ns-ititle{font-family:var(--serif);font-size:12px;color:var(--accent);margin-bottom:7px;letter-spacing:1px}
.ns-itext{font-size:12px;font-weight:300;color:var(--t2);line-height:1.85}
.ns-legend{padding:4px 18px 16px;display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:1}
.ns-li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3);letter-spacing:.5px}
.ns-ld{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* PATTERN DISCOVERY */
.pat-body{flex:1;padding:4px 22px 18px;overflow-y:auto;z-index:1}
.pat-body::-webkit-scrollbar{display:none}
.pat-sec{margin-bottom:28px;position:relative;opacity:0;animation:patFadeIn .6s ease-out forwards}
.pat-sec:nth-child(1){animation-delay:.1s}
.pat-sec:nth-child(2){animation-delay:.2s}
.pat-sec:nth-child(3){animation-delay:.3s}
.pat-sec:nth-child(4){animation-delay:.4s}
@keyframes patFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.pat-st{font-family:var(--serif);font-size:13px;font-weight:300;color:var(--accent);letter-spacing:2.5px;margin-bottom:14px;display:flex;align-items:center;gap:10px;position:relative}
.pat-st-icon{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,rgba(202,169,122,.15),rgba(202,169,122,.05));border:.5px solid rgba(202,169,122,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 12px rgba(202,169,122,.08)}
.pat-st-icon svg{width:12px;height:12px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pat-st-text{flex:1}
.pat-st::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,var(--line),transparent)}
.ins-card{padding:22px 24px;border-radius:16px;background:linear-gradient(135deg,rgba(202,169,122,.08),rgba(202,169,122,.02) 60%,rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.15);box-shadow:0 0 28px rgba(202,169,122,.04),inset 0 0 40px rgba(202,169,122,.02);position:relative;overflow:hidden}
.ins-card::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(202,169,122,.06),transparent 70%);pointer-events:none}
.ins-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(202,169,122,.2),transparent)}
.ins-txt{font-family:var(--serif);font-size:15px;font-weight:300;line-height:2.1;color:var(--t1);position:relative;z-index:1}
.ins-txt em{color:var(--accent);font-style:normal;font-weight:400;position:relative;padding:0 2px}
.ins-txt em::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
.img-list{display:flex;flex-direction:column;gap:10px}
.img-row{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.08);transition:all .2s var(--ease);position:relative;overflow:hidden}
.img-row:active{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.03));transform:scale(.98);border-color:rgba(202,169,122,.15)}
.img-emoji{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,rgba(202,169,122,.08),rgba(202,169,122,.03));border:.5px solid rgba(202,169,122,.12);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 16px rgba(202,169,122,.05)}
.img-info{flex:1;min-width:0}
.img-name{font-family:var(--serif);font-size:14px;font-weight:400;letter-spacing:.5px;margin-bottom:3px;color:var(--t1)}
.img-det{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.img-bar{width:48px;flex-shrink:0}
.img-bar-t{height:4px;border-radius:2px;background:rgba(202,169,122,.08);overflow:hidden}
.img-bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),rgba(202,169,122,.7));transition:width .6s var(--ease)}
.w-chips{display:flex;gap:9px;flex-wrap:wrap}
.w-chip{padding:10px 16px;border-radius:20px;border:.5px solid rgba(202,169,122,.1);background:rgba(255,255,255,.03);font-size:11px;font-weight:300;color:var(--t2);display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.w-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.let-list{display:flex;flex-direction:column;gap:9px}
.let-row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.08);transition:all .2s var(--ease)}
.let-row:active{background:rgba(255,255,255,.06);transform:translateX(2px);border-color:rgba(202,169,122,.15)}
.let-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor}
.let-m{flex:1;min-width:0}
.let-p{font-size:12px;font-weight:300;color:var(--t1);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px;line-height:1.6}
.let-t{font-size:9px;color:var(--t3);letter-spacing:.3px;opacity:.8}
.let-tag{font-size:9px;padding:4px 10px;border-radius:10px;background:rgba(202,169,122,.06);color:var(--accent);flex-shrink:0;border:.5px solid rgba(202,169,122,.1);letter-spacing:.5px}

/* SQUARE (Dream Square) */
.sq-list{display:flex;flex-direction:column;gap:14px}
.sq-card{
  padding:18px 20px;border-radius:18px;
  background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(255,255,255,.018));

  margin-bottom:0;transition:all .25s var(--ease);position:relative;overflow:hidden
}

.sq-emo-tag{font-size:10px;padding:4px 12px;border-radius:12px;letter-spacing:.5px;font-weight:400}

.sq-emo-tag[data-emo="жғіеҝө"]{background:rgba(168,130,212,.12);color:var(--el);border:.5px solid rgba(168,130,212,.25)}

.sq-emo-tag[data-emo="е–ңжӮҰ"]{background:rgba(212,192,128,.12);color:var(--ej);border:.5px solid rgba(212,192,128,.25)}
.sq-emo-tag[data-emo="жңӘзҹҘ"]{background:rgba(255,255,255,.06);color:var(--t3);border:.5px solid var(--line2)}
.sq-date{font-size:10px;color:var(--t3);letter-spacing:.3px}
.sq-text{font-size:13px;font-weight:300;color:var(--t1);line-height:1.9;margin-bottom:12px;letter-spacing:.2px}
.sq-actions{display:flex;align-items:center;gap:10px}
.sq-act-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:12px;font-size:11px;letter-spacing:.3px;transition:all .2s var(--ease)}
.sq-act-btn:active{transform:scale(.94)}
.sq-like{border:.5px solid rgba(202,169,122,.2);color:var(--accent);background:rgba(202,169,122,.04)}
.sq-like:active{background:rgba(202,169,122,.1)}
.sq-like.liked{background:rgba(202,169,122,.12);border-color:rgba(202,169,122,.35)}
.sq-comment{border:.5px solid var(--line2);color:var(--t3);background:rgba(255,255,255,.02)}
.sq-comment:active{background:rgba(255,255,255,.05)}
.sq-comments-wrap{margin-top:12px;padding-top:12px;border-top:.5px solid var(--line)}
.sq-comment-item{font-size:12px;color:var(--t2);margin-bottom:6px;line-height:1.7}
.sq-comment-user{color:var(--accent);font-weight:400}
.sq-comment-more{font-size:11px;color:var(--t3);margin-top:4px}
@keyframes sqLikePop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sq-like-pop{animation:sqLikePop .3s ease-out}

/* SETTINGS ENHANCEMENTS */
.set-section{opacity:0;animation:setSecIn .5s ease-out forwards}
.set-section:nth-child(1){animation-delay:.05s}
.set-section:nth-child(2){animation-delay:.1s}
.set-section:nth-child(3){animation-delay:.15s}
.set-section:nth-child(4){animation-delay:.2s}
.set-section:nth-child(5){animation-delay:.25s}
@keyframes setSecIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.set-toggle{transition:background .25s var(--spring)}
.set-toggle::after{transition:transform .25s var(--spring),background .2s}
.set-row{transition:background .15s,border-color .15s}
.set-row:active{background:rgba(255,255,255,.05);border-color:rgba(202,169,122,.12)}
.set-danger-btn{padding:8px 16px;border-radius:12px;border:.5px solid rgba(196,112,128,.3);font-size:12px;color:#c47080;background:rgba(196,112,128,.06);letter-spacing:.5px;transition:all .2s var(--ease)}
.set-danger-btn:active{background:rgba(196,112,128,.15);transform:scale(.95)}
.set-select{padding:6px 10px;border-radius:10px;border:.5px solid var(--line2);background:rgba(255,255,255,.04);color:var(--t2);font-size:12px;letter-spacing:.3px;appearance:none;-webkit-appearance:none;cursor:pointer;min-width:72px;text-align:center}
.set-select:focus{border-color:rgba(202,169,122,.3);outline:none}
.set-accent-btn{padding:8px 16px;border-radius:12px;border:.5px solid rgba(202,169,122,.3);font-size:12px;color:var(--accent);background:rgba(202,169,122,.06);letter-spacing:.5px;transition:all .2s var(--ease)}
.set-accent-btn:active{background:rgba(202,169,122,.12);transform:scale(.95)}
.set-neutral-btn{padding:8px 16px;border-radius:12px;border:.5px solid var(--line2);font-size:12px;color:var(--t2);background:rgba(255,255,255,.03);letter-spacing:.5px;transition:all .2s var(--ease)}
.set-neutral-btn:active{background:rgba(255,255,255,.06);transform:scale(.95)}
/* Confirm modal */
.confirm-modal{position:fixed;inset:0;z-index:900;background:rgba(5,5,16,.85);display:flex;align-items:center;justify-content:center;padding:0 32px;opacity:0;visibility:hidden;transition:opacity .3s var(--ease),visibility 0s .3s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.confirm-modal.on{opacity:1;visibility:visible;transition:opacity .3s var(--ease),visibility 0s 0s}
.confirm-box{max-width:300px;width:100%;padding:28px 24px;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:.5px solid rgba(202,169,122,.12);text-align:center;transform:scale(.9);transition:transform .3s var(--spring)}
.confirm-modal.on .confirm-box{transform:scale(1)}
.confirm-title{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--t1);letter-spacing:1px;margin-bottom:10px}
.confirm-desc{font-size:13px;font-weight:300;color:var(--t2);line-height:1.8;margin-bottom:24px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:12px;border-radius:14px;border:.5px solid var(--line2);font-size:13px;color:var(--t2);background:rgba(255,255,255,.03);letter-spacing:.5px;transition:all .15s}

.confirm-ok{flex:1;padding:12px;border-radius:14px;border:.5px solid rgba(196,112,128,.4);font-size:13px;color:#c47080;background:rgba(196,112,128,.08);letter-spacing:.5px;transition:all .15s}
.confirm-ok:active{background:rgba(196,112,128,.18)}

/* SHARE PICKER */

/* WRITE ENHANCEMENTS */
.write-field{transition:text-shadow .3s}

/* Guide trigger */
.guide-trigger{display:block;margin:8px auto 0;padding:6px 14px;border-radius:14px;border:.5px solid var(--line2);font-size:11px;color:var(--t3);letter-spacing:.5px;background:rgba(255,255,255,.02);transition:all .2s var(--ease);cursor:pointer}

/* Guide overlay */
.guide-overlay{position:fixed;inset:0;z-index:200;background:rgba(5,5,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:letterIn .35s ease-out}
.guide-overlay.on{display:flex}
.guide-progress{display:flex;gap:6px;margin-bottom:28px}

.guide-input{width:100%;min-height:80px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.04);border:.5px solid var(--line2);font-size:14px;font-weight:300;color:var(--t1);caret-color:var(--accent);resize:none;line-height:1.8;transition:border-color .2s}
.guide-input:focus{border-color:rgba(202,169,122,.3);outline:none}

.guide-skip{padding:10px 20px;border-radius:16px;border:none;font-size:13px;color:var(--t3);background:none;cursor:pointer;letter-spacing:.5px}
.guide-skip:active{color:var(--t2)}
.guide-next{padding:10px 28px;border-radius:16px;border:.5px solid var(--accent);font-family:var(--serif);font-size:14px;color:var(--accent);background:rgba(202,169,122,.06);letter-spacing:1px;cursor:pointer;transition:all .2s var(--ease)}

.scr.leave-back{transform:translateX(40px);opacity:0;visibility:visible;

/* Staggered page entrance */
@keyframes secIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.scr.on .chat-body{animation:secIn .4s ease-out .05s both}
.scr.on .hist-body{animation:secIn .4s ease-out .05s both}

/* Touch ripple */
@keyframes touchRipple{0%{transform:scale(0);opacity:.25}100%{transform:scale(2.5);opacity:0}}

/* Button press */
.btn-send,.chat-done-btn,.ob-btn,.we-chip,.home-recent-item,.hist-item,.img-row,.let-row{position:relative;overflow:hidden}
.btn-send::after,.chat-done-btn::after,.ob-btn::after{

.btn-send:active::after,.chat-done-btn:active::after,.ob-btn:active::after{opacity:1;transition:opacity 0s}

/* Back button polish */

.nhdr-back::after,.nhdr-act::after{
  content:'';position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;

  transform:scale(0);opacity:0;pointer-events:none}
.nhdr-back:active::after,.nhdr-act:active::after{animation:touchRipple .4s ease-out forwards}

/* Bottom tabs polish */
.btab{position:relative;overflow:hidden}
.btab::after{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:rgba(255,255,255,.06);transform:scale(0);opacity:0;pointer-events:none}
.btab:active::after{animation:touchRipple .35s ease-out forwards}
.bfab{position:relative;overflow:hidden}
.bfab::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:rgba(202,169,122,.2);transform:scale(0);opacity:0;pointer-events:none;z-index:2}
.bfab:active::after{animation:touchRipple .35s ease-out forwards}

/* Chat bubble entrance */
@keyframes bubbleIn{
  from{opacity:0;transform:translateY(10px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.chat-bubble{animation-name:bubbleIn;animation-duration:.45s}

/* Send button glow */

}

/* Onboarding step transition */
.ob-step{transition:opacity .3s ease-out,transform .3s ease-out}

/* WEEKLY REPORT OVERLAY */
.report-overlay{position:fixed;inset:0;z-index:850;background:var(--bg);display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .4s var(--ease),visibility 0s .4s;overflow-y:auto}

<script>

/* жҢүиҙҰеҸ·йҡ”зҰ»зҡ„еӯҳеӮЁ keyпјҡдёҚеҗҢз”ЁжҲ·дҪҝз”ЁдёҚеҗ?keyпјҢеҢҝеҗ?жңӘзҷ»еҪ•е…ұз”?base key */
function _getStoreKey(){
  var user=_getCurrentUser();
  if(user&&user.email){
    /* з”ЁйӮ®з®ұз”ҹжҲҗе®үе…Ёзҹӯж ҮиҜҶпјҲеҺ»йҷӨзү№ж®Ҡеӯ—з¬Ұпјү */
    return STORE_KEY_BASE+'_'+user.email.replace(/[^a-zA-Z0-9]/g,'_').slice(0,30);
  }
  return STORE_KEY_BASE;
}

/* йҰ–ж¬Ўзҷ»еҪ•ж—¶пјҢе°Ҷж—§е…ұдә«ж•°жҚ®иҝҒз§»еҲ°еҪ“еүҚиҙҰеҸ?*/
function _migrateStoreIfNeeded(){
  var newKey=_getStoreKey();
  if(newKey===STORE_KEY_BASE)return; /* еҢҝеҗҚ/ж— йӮ®з®ұпјҢж— йңҖиҝҒз§» */
  var oldData=localStorage.getItem(STORE_KEY_BASE);
  if(!oldData)return;
  var existingNew=localStorage.getItem(newKey);
  if(!existingNew){
    /* ж–°иҙҰеҸ·ж— ж•°жҚ®пјҢзӣҙжҺҘиҝҒз§»ж—§ж•°жҚ® */
    localStorage.setItem(newKey,oldData);
    .length,'dreams to account key');
  }else{
    /* ж–°иҙҰеҸ·е·Іжңүж•°жҚ®пјҢеҗҲе№¶пјҲеҺ»йҮҚпјү */
    try{
      var oldArr=JSON.parse(oldData)||[];
      var newArr=JSON.parse(existingNew)||[];
      var ids={};newArr.forEach(function(d){ids[d.id]=1});
      var added=0;
      oldArr.forEach(function(d){if(!ids[d.id]){newArr.push(d);added++}});
      if(added>0){
        newArr.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)});
        localStorage.setItem(newKey,JSON.stringify(newArr));
        ;
      }
    }catch(e){console.error("[Store] merge error:", e)}
  }
  /* жё…йҷӨж—§е…ұдә?keyпјҢйҒҝе…Қе…¶д»–иҙҰеҸ·зңӢеҲ?*/
  localStorage.removeItem(STORE_KEY_BASE);
}

function calcStreak(){
  var ds=getDreams();
  /* еҗҲе№¶жўҰеўғж—Ҙжңҹе’ҢзӯҫеҲ°ж—Ҙжң?*/
  var dreamDates=ds.map(function(d){return d.ts.slice(0,10)});
  var checkins=getCheckins();
  var checkinDates=Object.keys(checkins);
  var allDates=dreamDates.concat(checkinDates);
  if(!allDates.length)return{streak:0,best:0};
  var dates=allDates.sort().reverse();
  var unique=[];dates.forEach(function(d){if(unique.indexOf(d)<0)unique.push(d)});
  var today=new Date().toISOString().slice(0,10);
  var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  var streak=0;
  var checkDate=today;
  if(unique.indexOf(today)<0)checkDate=yesterday;
  for(var i=0;i<365;i++){
    if(unique.indexOf(checkDate)>=0){
      streak++;
      checkDate=new Date(new Date(checkDate+'T00:00:00').getTime()-86400000).toISOString().slice(0,10);
    }else{break}
  }
  /* Calculate best streak */
  var best=0;var cur=0;var prev='';
  unique.sort().forEach(function(d){
    if(prev){
      var diff=(new Date(d+'T00:00:00')-new Date(prev+'T00:00:00'))/86400000;
      if(diff===1){cur++}else{cur=1}
    }else{cur=1}
    if(cur>best)best=cur;
    prev=d;
  });
  return{streak:streak,best:Math.max(best,streak)};
}

function getBadges(){
  var s=calcStreak();
  var badges=[];
  if(s.streak>=1)badges.push({name:'еҲқйҶ’',icon:'рҹҢҷ',desc:'з¬¬дёҖж¬Ўи®°еҪ•жўҰеў?});
  if(s.streak>=3)badges.push({name:'дёүеӨң',icon:'вң?,desc:'иҝһз»ӯ 3 еӨ©и®°еҪ?});
  if(s.streak>=7)badges.push({name:'е‘Ёи®°',icon:'вӯ?,desc:'иҝһз»ӯ 7 еӨ©и®°еҪ?});
  if(s.streak>=14)badges.push({name:'еҚҠжңҲ',icon:'рҹҢҹ',desc:'иҝһз»ӯ 14 еӨ©и®°еҪ?});
  if(s.streak>=30)badges.push({name:'жңҲжҒ’',icon:'рҹ’«',desc:'иҝһз»ӯ 30 еӨ©и®°еҪ?});
  if(s.best>=7)badges.push({name:'еқҡжҢҒиҖ?,icon:'рҹҸ…',desc:'жңҖй•ҝиҝһз»?7 еӨ?});
  if(s.best>=30)badges.push({name:'иҝҪжўҰдә?,icon:'рҹҸҶ',desc:'жңҖй•ҝиҝһз»?30 еӨ?});
  return badges;
}

function getDreams(){try{return JSON.parse(localStorage.getItem(_getStoreKey()))||[]}catch(e){return[]}}
function saveDream(text,emotion,type){
  var ds=getDreams();
  var dream={id:Date.now(),text:text,emotion:emotion||'жңӘзҹҘ',ts:new Date().toISOString(),aiTurns:0,type:type||'жўҰеўғ'};
  ds.unshift(dream);
  localStorage.setItem(_getStoreKey(),JSON.stringify(ds));
  var user=_getCurrentUser();
  if(cbReady&&user){
    cbDb.collection('dreams').add({
      data:{text:dream.text,emotion:dream.emotion,type:dream.type,ts:dream.ts,aiTurns:dream.aiTurns||0}
    }).catch(function(){});
  }
  return ds;
}
function getStats(){
  var ds=getDreams();
  var days={};ds.forEach(function(d){days[d.ts.slice(0,10)]=1});
  return{total:ds.length,days:Object.keys(days).length}
}

  refreshAll();go('home');
}

/* === CLOUDBASE и…ҫи®Ҝдә‘ејҖеҸ?(еӣҪеҶ…еҗҺз«Ҝ) === */
/*

/* CloudBase v1 (signInWithEmailAndPassword) е·ІеҒңжӯўжӣҙж–°пјҢ

function _cbSignIn(email,password){
  if(_cbAuthV2&&typeof cbAuth.signInWithPassword==='function'){

  if(_cbAuthV2&&typeof cbAuth.signUp==='function'){
    console.log('[Auth] using v2 signUp');

  }
  if(typeof cbAuth.signUpWithEmailAndPassword==='function'){

function _cbGetSession(){
  /* v2: getSession; v1: getLoginState вҖ?йғҪиҝ”еӣ?Promise */
  if(typeof cbAuth.getSession==='function'){

  }

    if(result&&typeof result.then==='function')return result;
    return Promise.resolve(result||null);
  }
  return Promise.resolve(null);
}

function callQwenAPI(dreamText,userMessage,emotion,callback){
  if(!qwenAvailable||!QWEN_API_KEY){callback(null);return}
  
  var activePrompt=personaPrompts[chatPersona]||personaPrompts.gentle;
  var prompt=dreamText?'жҳЁжҷҡзҡ„жўҰпј?+dreamText+'\n\n':'';
  if(userMessage)prompt+='з”ЁжҲ·иҜҙпјҡ'+userMessage+'\n\n';
  prompt+='иҜ·ж №жҚ®д»ҘдёҠеҶ…е®№еӣһеә”гҖӮеҪ“еүҚжЈҖжөӢеҲ°зҡ„жғ…з»Әеҹәи°ғжҳҜпј?+emotion+'гҖ?;
  
  var body={
    model:'qwen-turbo',
    input:{messages:[
      {role:'system',content:activePrompt},
      {role:'user',content:prompt}
    ]},
    parameters:{result_format:'message',temperature:0.7,max_tokens:300}
  };
  
  fetch(QWEN_URL,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+QWEN_API_KEY,
      'X-DashScope-SSE':'disable'
    },
    body:JSON.stringify(body)
  }).then(function(r){
    console.log('Qwen API response status:',r.status);
    if(!r.ok)throw new Error('API returned '+r.status);
    return r.json()})
  .then(function(data){
    console.log('Qwen API response data:',data);
    if(data.output&&data.output.choices&&data.output.choices[0]){
      var msg=data.output.choices[0].message;
      callback(msg.content);
    }else{
      console.warn('Qwen API no valid output:',data);
      callback(null);
    }
  })
  .catch(function(e){
    console.error('Qwen API error:',e.message||e);
    callback(null);
  });
  
  /* Add timeout */
  setTimeout(function(){
    console.warn('Qwen API timeout after 8s');
    callback(null);
  },8000);
}

    /* иҝҒз§»ж—§е…ұдә«ж•°жҚ®еҲ°еҪ“еүҚиҙҰеҸ· */

function syncDreamsToCloud(dreams){
  var user=_getCurrentUser();
  if(!cbReady||!user||!dreams.length)return Promise.resolve();
  var col=cbDb.collection('dreams');
  var promises=[];
  var count=Math.min(dreams.length,500);
  for(var i=0;i<count;i++){
    var d=dreams[i];
    promises.push(col.add({
      data:{text:d.text,emotion:d.emotion,type:d.type||'жўҰеўғ',ts:d.ts,aiTurns:d.aiTurns||0,localId:d.id}
    }));
  }
  return Promise.all(promises).catch(function(e){console.warn('Sync failed:',e)});
}

function loadDreamsFromCloud(){
  var user=_getCurrentUser();
  if(!cbReady||!user)return Promise.resolve([]);
  return cbDb.collection('dreams').orderBy('ts','desc').limit(500).get().then(function(res){
    if(!res.data)return [];
    return res.data.map(function(doc){
      return {
        id:doc.localId||doc._id,
        text:doc.text||'',
        emotion:doc.emotion||'жңӘзҹҘ',
        ts:doc.ts||'',
        aiTurns:doc.aiTurns||0,
        type:doc.type||'жўҰеўғ'
      };
    });
  });
}

function mergeDreams(local,cloud){
  var map={};
  local.forEach(function(d){map[d.id]=d});
  cloud.forEach(function(d){map[d.id]=d});
  var merged=Object.keys(map).map(function(k){return map[k]});
  merged.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)});
  return merged;
}

  'е–ңжӮҰ':['йЈ?,'ејҖеҝ?,'з¬?,'и·іиҲһ','еәҶзҘқ','зӨјзү©','жӢҘжҠұ','еҘ”и·‘','иҮӘз”ұ','е…?,'еҪ©иүІ','иҠұејҖ','е”ұжӯҢ']
};

function detectEmotion(text){
  if(!text)return'жңӘзҹҘ';
  var scores={};
  Object.keys(emotionMap).forEach(function(em){
    scores[em]=0;
    emotionMap[em].forEach(function(kw){if(text.indexOf(kw)>=0)scores[em]++});
  });
  var best='жңӘзҹҘ',max=0;
  Object.keys(scores).forEach(function(em){if(scores[em]>max){max=scores[em];best=em}});
  return best;
}

function go(n){

  var fi=pageOrder.indexOf(cur),ni=pageOrder.indexOf(n);
  var dir=(ni>=0&&fi>=0&&ni<fi)?'back':'fwd';
  var f=document.getElementById('s-'+cur),t=document.getElementById('s-'+n);

  f.classList.remove('on');
  f.classList.add('leave-'+dir);

  /* Entering new screen */
  t.classList.add('enter-'+dir);
  /* Force reflow so the browser registers the starting transform */
  void t.offsetHeight;
  t.classList.remove('enter-fwd','enter-back');
  t.classList.add('on');
  t.scrollTop=0;
  cur=n;
  document.querySelectorAll('.pb').forEach(function(b){b.classList.toggle('on',b.dataset.s===n)});
  if(n==='ns')initStars();

function showGuideStep(){

  var prog=document.getElementById('guideProgress');

}

function nextGuide(){
  var val=document.getElementById('guideInput').value.trim();
  guideAnswers[guideIdx]=val||'';
  guideIdx++;
  if(guideIdx>=guideSteps.length){
    finishGuide();
    return;
  }
  showGuideStep();
}

function skipGuide(){
  guideAnswers[guideIdx]='';
  guideIdx++;
  if(guideIdx>=guideSteps.length){
    finishGuide();
    return;
  }
  showGuideStep();
}



function finishGuide(){
  document.getElementById('guideOverlay').classList.remove('on');
  /* еҗҲе№¶зӯ”жЎҲдёәе®Ңж•ҙи®°еҪ?*/
  var parts=[];
  var labels=['ең°ж–№','дәәзү©','з”»йқў','ж„ҹи§ү','еҗҚеӯ—'];
  for(var i=0;i<guideSteps.length;i++){
    if(guideAnswers[i]&&guideAnswers[i].length>0){
      if(i===4){
        /* жўҰзҡ„еҗҚеӯ—еҚ•зӢ¬ж”ҫеүҚйқ?*/
        parts.unshift('гҖ?+guideAnswers[i]+'гҖ?);
      }else{
        parts.push(guideAnswers[i]);
      }
    }
  }
  var text=parts.join('пј?);
  if(text.length>0){
    document.getElementById('dreamIn').value=text;
    updateCharCount();
  }
  guideIdx=0;
  guideAnswers=[];
}

function animateRecvText(){
  var el=document.getElementById('recvTxt');
  if(!el)return;
  
  var phrases=['дҪ зҡ„дҝЎжӯЈеңЁи·Ҝдё?,'жңүдәәжӯЈеңЁи®ӨзңҹиҜ»е®ғ'];
  var html='';
  var globalIdx=0;
  
  phrases.forEach(function(phrase,pi){
    if(pi>0)html+='<br>';
    for(var i=0;i<phrase.length;i++){
      var delay=(0.8+globalIdx*0.12).toFixed(2);
      html+='<span style="animation-delay:'+delay+'s">'+phrase[i]+'</span>';
      globalIdx++;
    }
  });
  
  el.innerHTML=html;
}

function getAIResponse(emotion,turn){
  var pool=aiResponses[emotion]||aiResponses['жңӘзҹҘ'];
  return pool[Math.min(turn,pool.length-1)];
}

  var idx=chatTurn%pool.length;
  var resp=pool[idx];

 *      - Safari (macOS/iOS)пјҡдҪҝз”?Apple жңҚеҠЎеҷЁпјҢеӣҪеҶ…еҸҜз”Ё
 *   2. еҰ?Web Speech API дёҚеҸҜз”ЁпјҢжҸҗзӨәз”ЁжҲ·дҪҝз”Ё Edge жөҸи§Ҳеҷ? *
 * еҰӮйңҖжӣҙзЁіе®ҡзҡ„еӣҪеҶ…иҜӯйҹіиҜҶеҲ«пјҢеҸҜеңЁи®ҜйЈһејҖж”ҫе№іеҸ°з”іиҜ·е…Қиҙ№йўқеәҰпјҡ
 *   https://www.xfyun.cn/services/lfasr
 *   з”іиҜ·еҗҺеңЁи®ҫзҪ®йЎөйқўеЎ«е…Ҙ appId / apiKey / apiSecret еҚіеҸҜеҗҜз”Ё
 */
var voiceRec=null;
var voiceTimer=null;
var voiceSec=0;
var voiceSupported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);

function startVoice(){
  var overlay=document.getElementById('voiceOverlay');
  var fb=document.getElementById('voiceFallback');
  var preview=document.getElementById('voicePreview');
  var status=document.getElementById('voiceStatus');

  overlay.classList.add('on');
  preview.textContent='';
  document.getElementById('voiceTime').textContent='00:00';
  fb.style.display='none';
  status.textContent='жӯЈеңЁиҒҶеҗ¬вҖҰвҖ?;
  voiceSec=0;

  if(!voiceSupported){
    status.textContent='иҜӯйҹідёҚеҸҜз”?;
    fb.style.display='block';
    fb.innerHTML='еҪ“еүҚжөҸи§ҲеҷЁдёҚж”ҜжҢҒиҜӯйҹіиҜҶеҲ«<br><br>'
      +'жҺЁиҚҗдҪҝз”Ё <b>Microsoft Edge</b> жөҸи§Ҳеҷ?br>'
      +'пјҲWindows иҮӘеёҰпјҢиҜӯйҹіиҜҶеҲ«иө°еӣҪеҶ…жңҚеҠЎеҷЁпјү<br><br>'
      +'жҲ–жүӢеҠЁиҫ“е…Ҙж–Үеӯ?;
    return;
  }

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRec=new SR();
  voiceRec.lang='zh-CN';
  voiceRec.continuous=true;
  voiceRec.interimResults=true;
  voiceRec.maxAlternatives=1;

  var fullText='';
  voiceRec.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fullText+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    preview.textContent=fullText+interim;
  };
  voiceRec.onerror=function(e){
    status.textContent='еҮәй”ҷдәҶпјҢиҜ·йҮҚиҜ?;
    console.warn('Voice error:',e.error);
    if(e.error==='network'||e.error==='service-not-allowed'){
      status.textContent='иҜӯйҹіжңҚеҠЎдёҚеҸҜз”?;
      fb.style.display='block';
      fb.innerHTML='иҜӯйҹіиҜҶеҲ«жңҚеҠЎиҝһжҺҘеӨұиҙҘ<br>'
        +'еҰӮдҪҝз”?Chrome жөҸи§ҲеҷЁпјҢиҜ·е°қиҜ•жҚўз”?<b>Microsoft Edge</b><br>'
        +'пјҲEdge зҡ„иҜӯйҹіжңҚеҠЎеңЁеӣҪеҶ…еҸҜжӯЈеёёдҪҝз”Ёпјү';
    }
  };
  voiceRec.onend=function(){
    if(voiceRec&&voiceRec._active){
      try{voiceRec.start()}catch(e){console.error("[Store] merge error:", e)}
    }
  };

  voiceRec._active=true;
  try{voiceRec.start()}catch(e){status.textContent='еҗҜеҠЁеӨұиҙҘ'}

  voiceTimer=setInterval(function(){
    voiceSec++;
    var m=String(Math.floor(voiceSec/60)).padStart(2,'0');
    var s=String(voiceSec%60).padStart(2,'0');
    document.getElementById('voiceTime').textContent=m+':'+s;
  },1000);
}

function stopVoice(){
  var overlay=document.getElementById('voiceOverlay');
  var preview=document.getElementById('voicePreview');
  var text=preview.textContent.trim();

  if(voiceRec){voiceRec._active=false;try{voiceRec.stop()}catch(e){voiceRec=null}}
  if(voiceTimer){clearInterval(voiceTimer);voiceTimer=null}
  overlay.classList.remove('on');

  if(text){
    var field=document.getElementById('dreamIn');
    field.value=field.value?(field.value+'\n'+text):text;
    if(cur!=='write')go('write');
  }
}

  localStorage.setItem(CHECKIN_KEY,JSON.stringify(checkins));

    var ds=getDreams();

function timeAgo(iso){
  var now=Date.now(),then=new Date(iso).getTime();
  var diff=Math.floor((now-then)/1000);
  if(diff<60)return'еҲҡеҲҡ';
  if(diff<3600)return Math.floor(diff/60)+'еҲҶй’ҹеү?;
  if(diff<86400)return Math.floor(diff/3600)+'е°Ҹж—¶еү?;
  if(diff<604800)return Math.floor(diff/86400)+'еӨ©еүҚ';
  return new Date(iso).toLocaleDateString('zh-CN');
}

    return '<div class="hist-item" style="animation:secIn .4s ease-out '+delay+'s both" onclick="toggleHistExpand(this)"><div class="hist-dot" style="background:'+c+';color:'+c+'"></div><div class="hist-info"><div class="hist-text">'+highlighted+'</div><div class="hist-meta"><span>'+dateStr+'</span><span class="hist-tag">'+d.emotion+'</span>'+typeTag+'</div>'+expandDiv+'</div><button onclick="event.stopPropagation();exportDreamCard('+d.id+')" class="set-accent-btn" style="flex-shrink:0">рҹ“Ө еҜјеҮә</button></div>';
  }).join('');
}

function toggleHistExpand(item){
  if(!item.classList.contains('hist-item'))return;
  var wasExpanded=item.classList.contains('expanded');
  /* Collapse all first */
  document.querySelectorAll('.hist-item.expanded').forEach(function(el){el.classList.remove('expanded')});
  if(!wasExpanded)item.classList.add('expanded');
}

function exportDreamCard(dreamId){
  var dreams=getDreams();
  var dream=dreams.find(function(d){return d.id===dreamId});
  if(!dream)return;
  
  currentExportDream=dream;
  
  var canvas=document.getElementById('cardCanvas');
  var overlay=document.getElementById('cardOverlay');
  
  /* Set canvas size for high quality export (9:16 aspect ratio) */
  var width=720,height=1280;
  canvas.width=width;canvas.height=height;
  var ctx=canvas.getContext('2d');
  
  /* Draw aurora background */
  drawCardBackground(ctx,width,height,dream.emotion);
  
  /* Draw dream content */
  drawCardContent(ctx,width,height,dream);
  
  /* Show overlay */
  overlay.classList.add('on');
}

function drawCardBackground(ctx,w,h,emotion){
  /* Base gradient */
  var bg=ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#0f0f2e');
  bg.addColorStop(.3,'#1a1040');
  bg.addColorStop(.7,'#0d1535');
  bg.addColorStop(1,'#151030');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  
  /* Emotion-based accent colors */
  var emotionColors={
    'дёҚе®ү':[196,112,128],
    'жғіеҝө':[148,114,196],
    'еӣ°жғ‘':[112,144,196],
    'е№ійқҷ':[109,184,196],
    'е–ңжӮҰ':[196,176,109],
    'жңӘзҹҘ':[202,169,122]
  };
  
  var baseColor=emotionColors[emotion]||emotionColors['жңӘзҹҘ'];
  
  /* Aurora blobs */
  var blobs=[
    {x:w*.3,y:h*.4,r:280,c:baseColor,a:.15},
    {x:w*.7,y:h*.3,r:320,c:[255,140,200],a:.1},
    {x:w*.5,y:h*.7,r:300,c:[100,200,255],a:.09},
    {x:w*.2,y:h*.6,r:260,c:[200,100,255],a:.08},
    {x:w*.8,y:h*.6,r:240,c:[255,180,120],a:.07},
  ];
  
  blobs.forEach(function(b){
    var g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+','+b.a+')');
    g.addColorStop(.5,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+','+(b.a*.4)+')');
    g.addColorStop(1,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+',0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  });
  
  /* Floating particles */
  for(var i=0;i<50;i++){
    var x=Math.random()*w,y=Math.random()*h;
    var r=Math.random()*3+1;
    var pa=Math.random()*.4+.1;
    var hue=[
      [180,140,255],[255,160,220],[120,220,255],[220,120,255]
    ][Math.floor(Math.random()*4)];
    
    var pg=ctx.createRadialGradient(x,y,0,x,y,r*4);
    pg.addColorStop(0,'rgba('+hue[0]+','+hue[1]+','+hue[2]+','+(pa*.8)+')');
    pg.addColorStop(.5,'rgba('+hue[0]+','+hue[1]+','+hue[2]+','+(pa*.3)+')');
    pg.addColorStop(1,'rgba('+hue[0]+','+hue[1]+','+hue[2]+',0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(x,y,r*4,0,Math.PI*2);ctx.fill();
    
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba('+hue[0]+','+hue[1]+','+hue[2]+','+pa+')';
    ctx.fill();
  }
}

function drawCardContent(ctx,w,h,dream){
  var padding=60;
  var contentWidth=w-padding*2;
  
  /* App title at top */
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='24px "Noto Serif SC",serif';
  ctx.textAlign='center';
  ctx.fillText('еӨңдҝЎ Night Letter',w/2,padding);
  
  /* Date */
  var t=new Date(dream.ts);
  var dateStr=t.getFullYear()+'.'+(t.getMonth()+1)+'.'+t.getDate()+' '+
    String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font='20px sans-serif';
  ctx.fillText(dateStr,w/2,padding+40);
  
  /* Emotion badge */
  var emotionColors={
    'дёҚе®ү':'#c47080','жғіеҝө':'#9472c4','еӣ°жғ‘':'#7090c4',
    'е№ійқҷ':'#6db8c4','е–ңжӮҰ':'#c4b06d','жңӘзҹҘ':'#caa97a'
  };
  var emoColor=emotionColors[dream.emotion]||'#caa97a';
  
  ctx.fillStyle=emoColor;
  ctx.globalAlpha=.2;
  ctx.beginPath();
  ctx.roundRect(w/2-60,padding+70,120,40,20);
  ctx.fill();
  ctx.globalAlpha=1;
  
  ctx.fillStyle=emoColor;
  ctx.font='bold 22px sans-serif';
  ctx.fillText(dream.emotion,w/2,padding+96);
  
  /* Dream text - wrap and center */
  ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.font='28px "Noto Serif SC",serif';
  ctx.textAlign='left';
  
  var text=dream.text;
  var maxWidth=contentWidth;
  var lineHeight=48;
  var lines=[];
  var currentLine='';
  
  for(var i=0;i<text.length;i++){
    var testLine=currentLine+text[i];
    var metrics=ctx.measureText(testLine);
    if(metrics.width>maxWidth&&i>0){
      lines.push(currentLine);
      currentLine=text[i];
    }else{
      currentLine=testLine;
    }
  }
  lines.push(currentLine);
  
  /* Limit to 12 lines max */
  if(lines.length>12){
    lines=lines.slice(0,11);
    lines[10]+='вҖҰвҖ?;
  }
  
  var startY=h*.35;
  lines.forEach(function(line,idx){
    ctx.fillText(line,padding,startY+idx*lineHeight);
  });
  
  /* Bottom decoration */
  var bottomY=h-padding-80;
  ctx.strokeStyle='rgba(202,169,122,.2)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(w/2-100,bottomY);
  ctx.lineTo(w/2+100,bottomY);
  ctx.stroke();
  
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.font='italic 22px "Noto Serif SC",serif';
  ctx.textAlign='center';
  ctx.fillText('жўҰдёҚжҳҜзӯ”жЎҲпјҢжҳҜжғ…з»Әе…ҘеҸ?,w/2,bottomY+40);
}

function saveCard(){
  var canvas=document.getElementById('cardCanvas');
  
  try{
    /* Convert to blob and download */
    canvas.toBlob(function(blob){
      if(!blob){
        alert('дҝқеӯҳеӨұиҙҘпјҢиҜ·йҮҚиҜ•');
        return;
      }
      
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;
      a.download='night-letter-'+Date.now()+'.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      alert('вң?еҚЎзүҮе·ІдҝқеӯҳеҲ°дҪ зҡ„зӣёеҶҢ');
    },'image/png',0.95);
  }catch(e){
    console.error('Save failed:',e);
    alert('дҝқеӯҳеӨұиҙҘпј?+e.message);
  }
}

function drawAICardContent(ctx,w,h,data,dream){

function requestNotificationPermission(){
  if(!('Notification' in window)){
    alert('дҪ зҡ„жөҸи§ҲеҷЁдёҚж”ҜжҢҒйҖҡзҹҘеҠҹиғҪ');
    document.getElementById('togNotif').classList.remove('on');
    return;
  }
  
  Notification.requestPermission().then(function(permission){
    if(permission==='granted'){
      scheduleMorningReminder();
      console.log('вң?жўҰеўғжҸҗйҶ’е·ІејҖеҗҜпјҢжҜҸеӨ©ж—©дёҠ 7:00 дјҡжҸҗйҶ’дҪ и®°еҪ•жўҰеўғ');
    }else{
      alert('йңҖиҰҒе…Ғи®ёйҖҡзҹҘжқғйҷҗжүҚиғҪејҖеҗҜжўҰеўғжҸҗйҶ?);
      document.getElementById('togNotif').classList.remove('on');
      notifEnabled=false;
    }
  }).catch(function(){
    alert('ж— жі•иҜ·жұӮйҖҡзҹҘжқғйҷҗ');
    document.getElementById('togNotif').classList.remove('on');
    notifEnabled=false;
  });
}

function scheduleMorningReminder(){
  if(!notifEnabled)return;
  
  /* Calculate time until next 7:00 AM */
  var now=new Date();
  var target=new Date();
  target.setHours(7,0,0,0);
  
  /* If it's already past 7:00 AM today, schedule for tomorrow */
  if(now>=target){
    target.setDate(target.getDate()+1);
  }
  
  var delay=target.getTime()-now.getTime();
  console.log('вҸ?дёӢж¬ЎжҸҗйҶ’е°ҶеңЁ '+target.toLocaleString('zh-CN')+' и§ҰеҸ‘пј?+Math.round(delay/3600000)+'е°Ҹж—¶еҗҺпјү');
  
  /* Clear existing timer */
  if(notifTimer)clearTimeout(notifTimer);
  
  /* Schedule notification */
  notifTimer=setTimeout(function(){
    if(!notifEnabled)return;
    
    showNotification();
    
    /* Reschedule for next day */
    setTimeout(function(){
      if(notifEnabled)scheduleMorningReminder();
    },2000);
  },delay);
}

function showNotification(){
  if(Notification.permission!=='granted')return;
  
  var messages=[

/* === HOME CANVAS вҖ?SOFT AMBIENT GRADIENT === */
var homeInited=false;
function initHome(){
  if(homeInited)return;homeInited=true;
  var c=document.getElementById('homeCanvas'),ctx=c.getContext('2d');
  var dpr=Math.min(window.devicePixelRatio||1,2),W=c.offsetWidth,H=c.offsetHeight;
  c.width=W*dpr;c.height=H*dpr;ctx.scale(dpr,dpr);

  /* Subtle gradient blobs вҖ?fewer and more transparent */
  var blobs=[
    {x:.3,y:.4,r:220,c:[140,120,200],a:.06,sp:.00015,ph:0},
    {x:.7,y:.3,r:240,c:[180,130,170],a:.05,sp:.00012,ph:2},
    {x:.5,y:.7,r:200,c:[120,160,200],a:.04,sp:.00014,ph:4},
  ];

  /* Sparse floating particles */
  var particles=[];
  for(var i=0;i<12;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*2+.8,
      vx:(Math.random()-.5)*.15,vy:-Math.random()*.2-.05,
      a:Math.random()*.2+.05,
      hue:[
        [160,140,200],[200,150,180],[130,180,210]
      ][Math.floor(Math.random()*3)],
      ph:Math.random()*6.28
    });
  }

  var px=0,py=0,tpx=0,tpy=0;
  document.getElementById('s-home').addEventListener('touchmove',function(e){var t=e.touches[0];var r=c.getBoundingClientRect();tpx=(t.clientX-r.left-W/2)/W*6;tpy=(t.clientY-r.top-H/2)/H*6},{passive:true});
  document.getElementById('s-home').addEventListener('touchend',function(){tpx=0;tpy=0},{passive:true});
  document.getElementById('s-home').addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();tpx=(e.clientX-r.left-W/2)/W*4;tpy=(e.clientY-r.top-H/2)/H*4},{passive:true});

  var t=0;
  function draw(){
    t++;ctx.clearRect(0,0,W,H);
    px+=(tpx-px)*.02;py+=(tpy-py)*.02;

    /* Calmer base gradient */
    var bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#111128');
    bg.addColorStop(.3,'#161230');
    bg.addColorStop(.7,'#0f1530');
    bg.addColorStop(1,'#131128');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    /* Soft aurora blobs */
    blobs.forEach(function(b){
      var bx=b.x*W+Math.sin(t*b.sp+b.ph)*30+px*.4;
      var by=b.y*H+Math.cos(t*b.sp*.8+b.ph)*25+py*.4;
      var br=b.a+Math.sin(t*.0008+b.ph)*.015;
      var g=ctx.createRadialGradient(bx,by,0,bx,by,b.r);
      g.addColorStop(0,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+','+br+')');
      g.addColorStop(.5,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+','+(br*.4)+')');
      g.addColorStop(1,'rgba('+b.c[0]+','+b.c[1]+','+b.c[2]+',0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,b.r,0,Math.PI*2);ctx.fill();
    });

    /* Gentle particles */
    particles.forEach(function(p){
      p.x+=p.vx+Math.sin(t*.003+p.ph)*.1;
      p.y+=p.vy;
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W}
      if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
      
      var pa=p.a+Math.sin(t*.005+p.ph)*.08;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.hue[0]+','+p.hue[1]+','+p.hue[2]+','+pa+')';
      ctx.fill();
    });

    /* Soft vignette */
    var vig=ctx.createRadialGradient(W/2,H/2,W*.35,W/2,H/2,W*.95);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(.6,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(8,8,24,.25)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

    requestAnimationFrame(draw);
  }
  draw();
}

    for(var i=0;i<dreams.length;i++){var dx=mx-pts[i].x,dy=my-pts[i].y;if(Math.sqrt(dx*dx+dy*dy)<dreams[i].r*3){selectedDream=i;showDreamDetail(dreams[i]);return}}

    dreams.forEach(function(d,i){var ppx=pts[i].x,ppy=pts[i].y,col=ec[d.e];if(selectedDream===i){ctx.beginPath();ctx.arc(ppx,ppy,d.r*6,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.stroke()}var g=ctx.createRadialGradient(ppx,ppy,0,ppx,ppy,d.r*5);g.addColorStop(0,col+'40');g.addColorStop(.4,col+'18');g.addColorStop(1,col+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ppx,ppy,d.r*5,0,Math.PI*2);ctx.fill();var br=1+Math.sin(t*.008+i)*.1;ctx.beginPath();ctx.arc(ppx,ppy,d.r*br,0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=.9;ctx.fill();ctx.globalAlpha=1;ctx.beginPath();ctx.arc(ppx-d.r*.2,ppy-d.r*.2,d.r*.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill()});

function likeDream(dreamId,btn){
  /* Visual feedback */
  if(btn){btn.classList.add('sq-like-pop','liked');setTimeout(function(){btn.classList.remove('sq-like-pop')},350)}
  
  if(!cbReady){
    document.getElementById('confirmTitle').textContent='жҸҗзӨә';
    document.getElementById('confirmDesc').textContent='зҰ»зәҝжЁЎејҸдёӢж— жі•зӮ№иө?;
    document.getElementById('confirmOk').textContent='зЎ®е®ҡ';
    document.getElementById('confirmOk').onclick=function(){closeConfirm()};
    document.getElementById('confirmModal').classList.add('on');
    return;
  }
  
  /* Optimistic update: increment locally first */
  var localDream=squareDreams.find(function(d){return d.id===dreamId});
  if(localDream)localDream.likes=(localDream.likes||0)+1;
  
  cbDb.collection('publicDreams').doc(dreamId).update({
    likes:cbDb.command.inc(1)
  }).then(function(){
    loadSquareDreams();
  }).catch(function(e){
    console.error('Like failed:',e);
    if(localDream)localDream.likes=Math.max(0,(localDream.likes||1)-1);
  });
}

      document.getElementById('confirmTitle').textContent='жҸҗзӨә';
      document.getElementById('confirmDesc').textContent='иҜҘжўҰеўғзҡ„з•ҷиЁҖе·ІиҫҫдёҠйҷҗпј? жқЎпјү';
      document.getElementById('confirmOk').textContent='зЎ®е®ҡ';
      document.getElementById('confirmOk').onclick=function(){closeConfirm()};
      document.getElementById('confirmModal').classList.add('on');
      return;
    }
    comments.push({user:'еҢҝеҗҚж—…дәә',text:comment.trim(),ts:new Date().toISOString()});
    return cbDb.collection('publicDreams').doc(dreamId).update({comments:comments});
  }).then(function(result){
    if(result)loadSquareDreams();
  }).catch(function(e){
    console.error('Comment failed:',e);
    document.getElementById('confirmTitle').textContent='з•ҷиЁҖеӨұиҙҘ';
    document.getElementById('confirmDesc').textContent=e.message||'жңӘзҹҘй”ҷиҜҜпјҢиҜ·зЁҚеҗҺйҮҚиҜ•гҖ?;
    document.getElementById('confirmOk').textContent='зЎ®е®ҡ';
    document.getElementById('confirmOk').onclick=function(){closeConfirm()};
    document.getElementById('confirmModal').classList.add('on');
  });
}

// Onboarding вҖ?called after auth init
function _checkOnboarding(){
  var hasOnboard=localStorage.getItem(ONBOARD_KEY);
  var user=_getCurrentUser();
  var isAnonLocal=localStorage.getItem('nightletter_session')==='__anon__';
  
  if(hasOnboard){
    /* Already onboarded вҖ?ensure login overlay is dismissed if user is logged in or anonymous */
    if(user||isAnonLocal){
      document.getElementById('loginOverlay').classList.add('off');
    }
    return;
  }
  
  /* Need to show onboarding */
  if(user||isAnonLocal){
    /* User is logged in or anonymous, show onboarding after a brief delay */
    setTimeout(showOnboard,600);
  }else{
    /* No user вҖ?wait for login then onboard */
    var _obCheck=setInterval(function(){
      if(document.getElementById('loginOverlay').classList.contains('off')){
        clearInterval(_obCheck);
        setTimeout(showOnboard,600);
      }
    },200);
  }
}
